services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/realtime_chat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:

